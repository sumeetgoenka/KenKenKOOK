<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ec"/>
      <stop offset="1" stop-color="#efe9df"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="1080" cy="100" r="6" fill="#ea580c" opacity="0.5"/>
  <circle cx="1110" cy="140" r="4" fill="#0f172a" opacity="0.3"/>
  <circle cx="120" cy="540" r="5" fill="#0f172a" opacity="0.3"/>

  <!-- KenKen sample grid -->
  <g transform="translate(80, 165)">
    <rect x="0" y="0" width="300" height="300" rx="16" fill="#0f172a"/>
    <g stroke="white" stroke-width="3" fill="none">
      <line x1="100" y1="14" x2="100" y2="286"/>
      <line x1="200" y1="14" x2="200" y2="286"/>
      <line x1="14" y1="100" x2="286" y2="100"/>
      <line x1="14" y1="200" x2="286" y2="200"/>
    </g>
    <!-- thick cage borders example -->
    <g stroke="#ea580c" stroke-width="6" fill="none" stroke-linecap="square">
      <line x1="100" y1="14" x2="100" y2="100"/>
      <line x1="14" y1="100" x2="100" y2="100"/>
      <line x1="200" y1="100" x2="200" y2="200"/>
      <line x1="100" y1="200" x2="200" y2="200"/>
    </g>
    <g font-family="Inter, -apple-system, sans-serif" font-weight="700" fill="white">
      <text x="22" y="38" font-size="20">12+</text>
      <text x="122" y="38" font-size="20">3</text>
      <text x="222" y="138" font-size="20">2÷</text>
      <text x="22" y="238" font-size="20">5−</text>
    </g>
  </g>

  <!-- Eyebrow tag -->
  <g transform="translate(440, 175)">
    <rect x="0" y="0" rx="20" width="320" height="40" fill="#fff1e6"/>
    <circle cx="22" cy="20" r="5" fill="#ea580c"/>
    <text x="38" y="27" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#c2410c" letter-spacing="1.5">UNLIMITED · UNIQUELY SOLVABLE</text>
  </g>

  <!-- Headline -->
  <text x="440" y="290" font-family="Inter, -apple-system, sans-serif" font-size="74" font-weight="800" fill="#0f172a" letter-spacing="-1.5">KenKenKOOK</text>
  <text x="440" y="360" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#334155">Free printable KenKen</text>
  <text x="440" y="402" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#ea580c">puzzle generator.</text>

  <!-- Subline -->
  <text x="440" y="460" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#64748b">Pick difficulty, grid size, and operators —</text>
  <text x="440" y="490" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#64748b">print a perfect PDF in one click.</text>

  <!-- Footer brand -->
  <g transform="translate(80, 540)">
    <rect width="38" height="38" rx="8" fill="#0f172a"/>
    <g stroke="white" stroke-width="2" fill="none">
      <rect x="6" y="6" width="26" height="26" rx="2"/>
      <line x1="14.7" y1="6" x2="14.7" y2="32"/>
      <line x1="23.3" y1="6" x2="23.3" y2="32"/>
      <line x1="6" y1="14.7" x2="32" y2="14.7"/>
      <line x1="6" y1="23.3" x2="32" y2="23.3"/>
    </g>
    <text x="52" y="20" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">kenken.anaygoenka.com</text>
    <text x="52" y="38" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#64748b">Built by Anay Goenka · Year 9 KenKen competitor</text>
  </g>
</svg>
